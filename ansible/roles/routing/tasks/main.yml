---
# routing/tasks/main.yml – Routing protocol configuration (BGP, OSPF, static)

- name: Configure BGP (EOS)
  arista.eos.eos_bgp_global:
    config:
      as_number: "{{ bgp_as }}"
      router_id: "{{ router_id | default(ansible_host) }}"
      neighbors: "{{ bgp_neighbors | default([]) }}"
    state: merged
  when:
    - ansible_network_os == "arista.eos.eos"
    - bgp_as is defined

- name: Configure BGP address family (EOS)
  arista.eos.eos_bgp_address_family:
    config:
      as_number: "{{ bgp_as }}"
      address_family:
        - afi: ipv4
          safi: unicast
          networks: "{{ bgp_networks | default([]) }}"
    state: merged
  when:
    - ansible_network_os == "arista.eos.eos"
    - bgp_as is defined

- name: Configure OSPF (EOS)
  arista.eos.eos_ospfv2:
    config:
      processes:
        - process_id: "{{ ospf_process_id | default(1) }}"
          router_id: "{{ router_id | default(ansible_host) }}"
          network:
            - address: "{{ ospf_network }}"
              wildcard_bits: "{{ ospf_wildcard | default('0.0.0.255') }}"
              area: "{{ ospf_area | default('0.0.0.0') }}"
    state: merged
  when:
    - ansible_network_os == "arista.eos.eos"
    - ospf_network is defined

- name: Configure static routes (EOS)
  arista.eos.eos_static_routes:
    config: "{{ static_routes | default([]) }}"
    state: merged
  when:
    - ansible_network_os == "arista.eos.eos"
    - static_routes is defined

- name: Configure BGP (IOS)
  cisco.ios.ios_bgp_global:
    config:
      as_number: "{{ bgp_as }}"
      bgp:
        router_id:
          address: "{{ router_id | default(ansible_host) }}"
      neighbors: "{{ bgp_neighbors | default([]) }}"
    state: merged
  when:
    - ansible_network_os == "cisco.ios.ios"
    - bgp_as is defined

- name: Configure OSPF (IOS)
  cisco.ios.ios_ospfv2:
    config:
      processes:
        - process_id: "{{ ospf_process_id | default(1) }}"
          router_id: "{{ router_id | default(ansible_host) }}"
          network:
            - address: "{{ ospf_network }}"
              wildcard_bits: "{{ ospf_wildcard | default('0.0.0.255') }}"
              area: "{{ ospf_area | default('0.0.0.0') }}"
    state: merged
  when:
    - ansible_network_os == "cisco.ios.ios"
    - ospf_network is defined
