! Arista EOS – leaf2 startup configuration
! Role: Leaf, BGP AS 65102
! Management IP: 172.20.20.22/24

hostname leaf2
!
username admin privilege 15 secret admin
username netauto privilege 15 secret netauto
!
management api http-commands
   no protocol https
   protocol http
   no shutdown
!
management ssh
   no shutdown
!
interface Management0
   ip address 172.20.20.22/24
!
ntp server 0.pool.ntp.org
!
snmp-server community public ro
snmp-server host 172.20.12.2 public
!
logging host 172.20.12.2 514
!
ip routing
!
vlan 100
   name management
!
vlan 200
   name servers
!
router bgp 65102
   router-id 10.0.0.22
   maximum-paths 2
   neighbor 10.0.2.0 remote-as 65001
   neighbor 10.0.2.0 send-community
   neighbor 10.0.2.0 maximum-routes 12000
   neighbor 10.1.2.0 remote-as 65002
   neighbor 10.1.2.0 send-community
   neighbor 10.1.2.0 maximum-routes 12000
   !
   address-family ipv4
      network 192.168.100.0/24
      neighbor 10.0.2.0 activate
      neighbor 10.1.2.0 activate
!
interface Ethernet1
   description "leaf2->spine1 (eth2)"
   no switchport
   ip address 10.0.2.1/31
!
interface Ethernet2
   description "leaf2->spine2 (eth2)"
   no switchport
   ip address 10.1.2.1/31
!
interface Loopback0
   ip address 10.0.0.22/32
!
end
