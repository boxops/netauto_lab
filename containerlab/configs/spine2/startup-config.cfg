! Arista EOS – spine2 startup configuration
! Role: Spine, BGP AS 65002
! Management IP: 172.20.20.12/24

hostname spine2
!
username admin privilege 15 secret admin
username netauto privilege 15 secret netauto
!
management api http-commands
   no protocol https
   protocol http
   no shutdown
!
management ssh
   no shutdown
!
interface Management0
   ip address 172.20.20.12/24
!
ntp server 0.pool.ntp.org
ntp server 1.pool.ntp.org
!
snmp-server community public ro
snmp-server host 172.20.12.2 public
!
logging host 172.20.12.2 514
logging buffered 32000 informational
!
ip routing
!
router bgp 65002
   router-id 10.0.0.2
   maximum-paths 4
   neighbor 10.1.1.1 remote-as 65101
   neighbor 10.1.1.1 send-community
   neighbor 10.1.1.1 maximum-routes 12000
   neighbor 10.1.2.1 remote-as 65102
   neighbor 10.1.2.1 send-community
   neighbor 10.1.2.1 maximum-routes 12000
   neighbor 10.1.3.1 remote-as 65103
   neighbor 10.1.3.1 send-community
   neighbor 10.1.3.1 maximum-routes 12000
   !
   address-family ipv4
      network 10.0.0.0/24
      neighbor 10.1.1.1 activate
      neighbor 10.1.2.1 activate
      neighbor 10.1.3.1 activate
!
interface Ethernet1
   description "spine2->leaf1 (eth2)"
   no switchport
   ip address 10.1.1.0/31
!
interface Ethernet2
   description "spine2->leaf2 (eth2)"
   no switchport
   ip address 10.1.2.0/31
!
interface Ethernet3
   description "spine2->leaf3 (eth2)"
   no switchport
   ip address 10.1.3.0/31
!
interface Loopback0
   ip address 10.0.0.2/32
!
end
