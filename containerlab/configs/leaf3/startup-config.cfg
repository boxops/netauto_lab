! Arista EOS – leaf3 startup configuration
! Role: Leaf, BGP AS 65103
! Management IP: 172.20.20.23/24

hostname leaf3
!
username admin privilege 15 secret admin
username netauto privilege 15 secret netauto
!
management api http-commands
   no protocol https
   protocol http
   no shutdown
!
management ssh
   no shutdown
!
interface Management0
   ip address 172.20.20.23/24
!
ntp server 0.pool.ntp.org
!
snmp-server community public ro
snmp-server host 172.20.12.2 public
!
logging host 172.20.12.2 514
!
ip routing
!
vlan 100
   name management
!
vlan 200
   name servers
!
vlan 300
   name transit
!
router bgp 65103
   router-id 10.0.0.23
   maximum-paths 2
   neighbor 10.0.3.0 remote-as 65001
   neighbor 10.0.3.0 send-community
   neighbor 10.0.3.0 maximum-routes 12000
   neighbor 10.1.3.0 remote-as 65002
   neighbor 10.1.3.0 send-community
   neighbor 10.1.3.0 maximum-routes 12000
   !
   address-family ipv4
      network 192.168.200.0/24
      neighbor 10.0.3.0 activate
      neighbor 10.1.3.0 activate
!
interface Ethernet1
   description "leaf3->spine1 (eth3)"
   no switchport
   ip address 10.0.3.1/31
!
interface Ethernet2
   description "leaf3->spine2 (eth3)"
   no switchport
   ip address 10.1.3.1/31
!
interface Ethernet3
   description "leaf3->client2"
   switchport access vlan 200
!
interface Vlan200
   ip address 192.168.200.1/24
!
interface Loopback0
   ip address 10.0.0.23/32
!
end
