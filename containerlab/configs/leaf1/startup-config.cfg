! Arista EOS – leaf1 startup configuration
! Role: Leaf, BGP AS 65101
! Management IP: 172.20.20.21/24

hostname leaf1
!
username admin privilege 15 secret admin
username netauto privilege 15 secret netauto
!
management api http-commands
   no protocol https
   protocol http
   no shutdown
!
management ssh
   no shutdown
!
interface Management0
   ip address 172.20.20.21/24
!
ntp server 0.pool.ntp.org
!
snmp-server community public ro
snmp-server host 172.20.12.2 public
!
logging host 172.20.12.2 514
!
ip routing
!
! VLANs
vlan 100
   name management
!
vlan 200
   name servers
!
router bgp 65101
   router-id 10.0.0.21
   maximum-paths 2
   ! to spine1
   neighbor 10.0.1.0 remote-as 65001
   neighbor 10.0.1.0 send-community
   neighbor 10.0.1.0 maximum-routes 12000
   ! to spine2
   neighbor 10.1.1.0 remote-as 65002
   neighbor 10.1.1.0 send-community
   neighbor 10.1.1.0 maximum-routes 12000
   !
   address-family ipv4
      network 192.168.100.0/24
      neighbor 10.0.1.0 activate
      neighbor 10.1.1.0 activate
!
interface Ethernet1
   description "leaf1->spine1 (eth1)"
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet2
   description "leaf1->spine2 (eth1)"
   no switchport
   ip address 10.1.1.1/31
!
interface Ethernet3
   description "leaf1->client1"
   switchport access vlan 100
!
interface Vlan100
   ip address 192.168.100.1/24
!
interface Loopback0
   ip address 10.0.0.21/32
!
end
