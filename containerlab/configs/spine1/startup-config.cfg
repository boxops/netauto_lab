! Arista EOS – spine1 startup configuration
! Role: Spine, BGP AS 65001
! Management IP: 172.20.20.11/24

hostname spine1
!
username admin privilege 15 secret admin
username netauto privilege 15 secret netauto
!
management api http-commands
   no protocol https
   protocol http
   no shutdown
!
management ssh
   no shutdown
!
! Management Interface
interface Management0
   ip address 172.20.20.11/24
!
! NTP
ntp server 0.pool.ntp.org
ntp server 1.pool.ntp.org
!
! SNMP
snmp-server community public ro
snmp-server host 172.20.12.2 public
!
! Syslog
logging host 172.20.12.2 514
logging buffered 32000 informational
!
! eBGP underlay to leaves
ip routing
!
router bgp 65001
   router-id 10.0.0.1
   maximum-paths 4
   ! leaf1
   neighbor 10.0.1.1 remote-as 65101
   neighbor 10.0.1.1 send-community
   neighbor 10.0.1.1 maximum-routes 12000
   ! leaf2
   neighbor 10.0.2.1 remote-as 65102
   neighbor 10.0.2.1 send-community
   neighbor 10.0.2.1 maximum-routes 12000
   ! leaf3
   neighbor 10.0.3.1 remote-as 65103
   neighbor 10.0.3.1 send-community
   neighbor 10.0.3.1 maximum-routes 12000
   !
   address-family ipv4
      network 10.0.0.0/24
      neighbor 10.0.1.1 activate
      neighbor 10.0.2.1 activate
      neighbor 10.0.3.1 activate
!
! P2P interfaces to leaves (unnumbered eBGP)
interface Ethernet1
   description "spine1->leaf1 (eth1)"
   no switchport
   ip address 10.0.1.0/31
!
interface Ethernet2
   description "spine1->leaf2 (eth1)"
   no switchport
   ip address 10.0.2.0/31
!
interface Ethernet3
   description "spine1->leaf3 (eth1)"
   no switchport
   ip address 10.0.3.0/31
!
! Loopback
interface Loopback0
   ip address 10.0.0.1/32
!
end
