---
# ============================================================
# Intermediate Network Automation Stack – Docker Compose
# ============================================================
# Networks: mgmt, monitoring, syslog, clab
# Run:  make init && make start
# ============================================================

networks:
  mgmt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.10.0/24
  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.11.0/24
  syslog-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.12.0/24
  clab:
    external: true
    name: clab

volumes:
  nautobot-postgres-data:
  nautobot-redis-data:
  nautobot-media:
  nautobot-static:
  nautobot-git-repos:
  prometheus-data:
  grafana-data:
  loki-data:
  alertmanager-data:
  gitea-data:
  gitea-postgres-data:
  rabbitmq-data:

# ── Re-usable anchors ────────────────────────────────────────
x-nautobot-base: &nautobot-base
  build:
    context: ./nautobot
    dockerfile: Dockerfile
  image: "netauto_lab/nautobot:latest"
  env_file: .env
  environment:
    NAUTOBOT_DB_HOST: nautobot-postgres
    NAUTOBOT_DB_NAME: "${NAUTOBOT_DB_NAME:-nautobot}"
    NAUTOBOT_DB_USER: "${NAUTOBOT_DB_USER:-nautobot}"
    NAUTOBOT_DB_PASSWORD: "${NAUTOBOT_DB_PASSWORD}"
    NAUTOBOT_REDIS_HOST: redis
    NAUTOBOT_REDIS_PASSWORD: "${NAUTOBOT_REDIS_PASSWORD}"
    NAUTOBOT_SECRET_KEY: "${NAUTOBOT_SECRET_KEY}"
    NAUTOBOT_ALLOWED_HOSTS: "${NAUTOBOT_ALLOWED_HOSTS:-*}"
    NAUTOBOT_LOG_LEVEL: "${NAUTOBOT_LOG_LEVEL:-INFO}"
  volumes:
    - ./nautobot/configuration/nautobot_config.py:/opt/nautobot/nautobot_config.py:ro
    - ./nautobot/scripts:/opt/nautobot/scripts
    - ./nautobot/initializers:/opt/nautobot/initializers
    - nautobot-media:/opt/nautobot/media
    - nautobot-static:/opt/nautobot/static
    - nautobot-git-repos:/opt/nautobot/git-repos
    - ./prometheus/file_sd:/opt/nautobot/prometheus_file_sd
  networks:
    - mgmt-network
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── PostgreSQL for Nautobot ──────────────────────────────────
  nautobot-postgres:
    image: "postgres:15-alpine"
    env_file: .env
    environment:
      POSTGRES_DB: "${NAUTOBOT_DB_NAME:-nautobot}"
      POSTGRES_USER: "${NAUTOBOT_DB_USER:-nautobot}"
      POSTGRES_PASSWORD: "${NAUTOBOT_DB_PASSWORD}"
    volumes:
      - nautobot-postgres-data:/var/lib/postgresql/data
    networks:
      - mgmt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NAUTOBOT_DB_USER:-nautobot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Redis (shared cache, Celery broker) ──────────────────────
  redis:
    image: "redis:7-alpine"
    command: >
      sh -c "redis-server --requirepass $$REDIS_PASSWORD"
    env_file: .env
    volumes:
      - nautobot-redis-data:/data
    networks:
      - mgmt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Nautobot – volume permission init ────────────────────────
  nautobot-volume-init:
    image: "busybox"
    user: "0"
    command: ["sh", "-c", "chown -R 999:999 /media /static /git-repos && chmod 775 /file_sd"]
    volumes:
      - nautobot-media:/media
      - nautobot-static:/static
      - nautobot-git-repos:/git-repos
      - ./prometheus/file_sd:/file_sd
    networks:
      - mgmt-network
    restart: "no"

  # ── Nautobot – web server ────────────────────────────────────
  nautobot:
    <<: *nautobot-base
    command: "nautobot-server runserver --insecure 0.0.0.0:8080"
    ports:
      - "${NAUTOBOT_PORT:-8080}:8080"
    depends_on:
      nautobot-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nautobot-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Nautobot – Celery worker ─────────────────────────────────
  nautobot-worker:
    <<: *nautobot-base
    command: "nautobot-server celery worker --loglevel INFO --concurrency 4"
    depends_on:
      nautobot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nautobot-server", "celery", "inspect", "ping"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s

  # ── Nautobot – Celery beat scheduler ────────────────────────
  nautobot-scheduler:
    <<: *nautobot-base
    command: "nautobot-server celery beat --loglevel INFO"
    depends_on:
      nautobot-worker:
        condition: service_healthy

  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: "prom/prometheus:latest"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - ./prometheus/recording_rules:/etc/prometheus/recording_rules:ro
      - ./prometheus/file_sd:/etc/prometheus/file_sd:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring-network
      - mgmt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Alertmanager ─────────────────────────────────────────────
  alertmanager:
    image: "prom/alertmanager:latest"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Topology API ─────────────────────────────────────────────
  topology-api:
    image: "python:3.11-slim"
    command: python /app/topology_api.py
    environment:
      NAUTOBOT_URL: "http://nautobot:8080"
      NAUTOBOT_TOKEN: "${NAUTOBOT_SUPERUSER_API_TOKEN}"
      PORT: "8765"
    volumes:
      - ./scripts/topology_api.py:/app/topology_api.py:ro
    networks:
      - mgmt-network
      - monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: "grafana/grafana:latest"
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD}"
      GF_SERVER_ROOT_URL: "${GF_SERVER_ROOT_URL:-http://localhost:3000}"
      GF_INSTALL_PLUGINS: "grafana-worldmap-panel,grafana-piechart-panel,agenty-flowcharting-panel,cloudspout-button-panel,yesoreyeram-infinity-datasource"
      GF_FEATURE_TOGGLES_ENABLE: "ngalert"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring-network
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Telegraf ─────────────────────────────────────────────────
  telegraf:
    build:
      context: ./telegraf
      dockerfile: Dockerfile
    image: "netauto-telegraf"
    env_file: .env
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - monitoring-network
      - mgmt-network
      - clab
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Node Exporter ────────────────────────────────────────────
  node-exporter:
    image: "prom/node-exporter:latest"
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks:
      - monitoring-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Blackbox Exporter ────────────────────────────────────────
  blackbox-exporter:
    image: "prom/blackbox-exporter:latest"
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - monitoring-network
      - mgmt-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Loki ─────────────────────────────────────────────────────
  loki:
    image: "grafana/loki:latest"
    command: "-config.file=/etc/loki/config.yml"
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - syslog-network
      - monitoring-network
    restart: unless-stopped
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Promtail (syslog ingest) ──────────────────────────────────
  promtail:
    image: "grafana/promtail:latest"
    command: "-config.file=/etc/promtail/config.yml"
    ports:
      - "${SYSLOG_UDP_PORT:-514}:1514/udp"
      - "${SYSLOG_TCP_PORT:-1514}:1514/tcp"
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
    networks:
      - syslog-network
    depends_on:
      - loki
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Gitea ────────────────────────────────────────────────────
  gitea-postgres:
    image: "postgres:15-alpine"
    env_file: .env
    environment:
      POSTGRES_DB: "${GITEA_DB_NAME:-gitea}"
      POSTGRES_USER: "${GITEA_DB_USER:-gitea}"
      POSTGRES_PASSWORD: "${GITEA_DB_PASSWORD}"
    volumes:
      - gitea-postgres-data:/var/lib/postgresql/data
    networks:
      - mgmt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GITEA_DB_USER:-gitea}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gitea:
    image: "gitea/gitea:latest"
    env_file: .env
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-postgres:5432
      GITEA__database__NAME: "${GITEA_DB_NAME:-gitea}"
      GITEA__database__USER: "${GITEA_DB_USER:-gitea}"
      GITEA__database__PASSWD: "${GITEA_DB_PASSWORD}"
      GITEA__security__SECRET_KEY: "${GITEA_SECRET_KEY}"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: "http://localhost:${GITEA_PORT:-3001}/"
    ports:
      - "${GITEA_PORT:-3001}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    volumes:
      - gitea-data:/data
    networks:
      - mgmt-network
    depends_on:
      gitea-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── RabbitMQ (message queue) ─────────────────────────────────
  rabbitmq:
    image: "rabbitmq:3-management-alpine"
    environment:
      RABBITMQ_DEFAULT_USER: netauto
      RABBITMQ_DEFAULT_PASS: "${REDIS_PASSWORD}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - mgmt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Ansible runner ───────────────────────────────────────────
  ansible:
    build:
      context: ./ansible
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NAUTOBOT_URL: "http://nautobot:8080"
      NAUTOBOT_TOKEN: "${NAUTOBOT_SUPERUSER_API_TOKEN}"
      ANSIBLE_VAULT_PASSWORD_FILE: /vault_pass
    volumes:
      - ./ansible:/ansible
      - ~/.ssh:/root/.ssh:ro
    networks:
      - mgmt-network
      - clab
    restart: "no"
    command: sleep infinity

  # ── AI Ops Agent ─────────────────────────────────────────────
  ai-ops-agent:
    build:
      context: ./ai-agents
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: ops
      NAUTOBOT_URL: "http://nautobot:8080"
      NAUTOBOT_TOKEN: "${NAUTOBOT_SUPERUSER_API_TOKEN}"
      PROMETHEUS_URL: "http://prometheus:9090"
      LOKI_URL: "http://loki:3100"
    networks:
      - mgmt-network
      - monitoring-network
      - syslog-network
    depends_on:
      nautobot:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── AI Network Engineering Agent ─────────────────────────────
  ai-eng-agent:
    build:
      context: ./ai-agents
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AGENT_TYPE: engineering
      NAUTOBOT_URL: "http://nautobot:8080"
      NAUTOBOT_TOKEN: "${NAUTOBOT_SUPERUSER_API_TOKEN}"
    networks:
      - mgmt-network
    depends_on:
      nautobot:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Agent Web UI ──────────────────────────────────────────────
  agent-ui:
    build:
      context: ./ai-agents
      dockerfile: Dockerfile.ui
    env_file: .env
    environment:
      OPS_AGENT_URL: "http://ai-ops-agent:8000"
      ENG_AGENT_URL: "http://ai-eng-agent:8001"
    ports:
      - "${AGENT_UI_PORT:-7860}:7860"
    networks:
      - mgmt-network
    depends_on:
      - ai-ops-agent
      - ai-eng-agent
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
