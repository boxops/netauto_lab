---
# Alertmanager configuration
# To enable real notifications, set these environment variables in .env:
#   ALERTMANAGER_SLACK_WEBHOOK, ALERTMANAGER_SLACK_CHANNEL
#   ALERTMANAGER_SMTP_HOST (host:port), ALERTMANAGER_EMAIL_FROM/TO
global:
  resolve_timeout: 5m
  smtp_from: 'alerts@lab.local'
  smtp_smarthost: 'localhost:25'
  smtp_auth_username: ''
  smtp_auth_password: ''
  slack_api_url: 'https://hooks.slack.com/services/REPLACE_WITH_REAL_WEBHOOK'

# Alert routing
route:
  group_by: ['alertname', 'severity', 'category']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      repeat_interval: 1h
    - match:
        category: routing
      receiver: network-team
    - match:
        category: availability
      receiver: network-team

# Receivers
receivers:
  - name: default
    slack_configs:
      - channel: '#network-alerts'
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}
        send_resolved: true

  - name: critical-alerts
    slack_configs:
      - channel: '#network-alerts'
        title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook }}
          {{ end }}
        send_resolved: true

  - name: network-team
    slack_configs:
      - channel: '#network-alerts'
        title: '[{{ .Status | toUpper }}] Network: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['instance']
