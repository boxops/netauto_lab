# ============================================================
# Prometheus Configuration
# ============================================================
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: 'netauto-lab'
    datacenter: 'site-lab'

# Load alerting rules
rule_files:
  - /etc/prometheus/alerts/*.yml
  - /etc/prometheus/recording_rules/*.yml

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Scrape Configurations ─────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (host metrics)
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # Blackbox exporter
  - job_name: blackbox-exporter
    static_configs:
      - targets: ['blackbox-exporter:9115']

  # Telegraf metrics exposed for Prometheus
  - job_name: telegraf
    static_configs:
      - targets: ['telegraf:9273']
    scrape_interval: 30s
    metrics_path: /metrics

  # Nautobot metrics endpoint
  - job_name: nautobot
    static_configs:
      - targets: ['nautobot:8080']
    metrics_path: /metrics
    scrape_interval: 60s

  # Loki
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics

  # Alertmanager
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  # SNMP exporter for network devices
  - job_name: snmp-devices
    static_configs:
      - targets:
          - 172.20.20.11   # spine1
          - 172.20.20.12   # spine2
          - 172.20.20.21   # leaf1
          - 172.20.20.22   # leaf2
          - 172.20.20.23   # leaf3
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # HTTP blackbox probes
  - job_name: http-probes
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://nautobot:8080/health/
          - http://grafana:3000/api/health
          - http://gitea:3000/api/healthz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ICMP ping probes
  - job_name: icmp-probes
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 172.20.20.11
          - 172.20.20.12
          - 172.20.20.21
          - 172.20.20.22
          - 172.20.20.23
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
