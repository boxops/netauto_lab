---
# Network alerting rules for Prometheus
#
# Metric naming note: all interface and BGP metrics come from Telegraf's SNMP
# inputs. Telegraf prefixes metrics with the measurement name, so:
#   interface_ifOperStatus   (not ifOperStatus)
#   interface_ifAdminStatus  (not ifAdminStatus)
#   bgp_peer_bgpPeerState    (not bgpPeerState)
# ifAdminStatus and ifOperStatus are metric *values* (1=up, 2=down), not labels.
# ifDescr and sysName are labels (marked is_tag=true in telegraf.conf).
groups:

  - name: device_availability
    rules:
      - alert: DeviceDown
        # Only use ICMP probe — the snmp-devices scrape job was removed (blackbox-exporter
        # has no SNMP module; SNMP data comes from Telegraf via the telegraf job).
        expr: probe_success{job="icmp-probes"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Device {{ $labels.instance }} is unreachable"
          description: "{{ $labels.instance }} has been unreachable for more than 2 minutes."
          runbook: "https://docs.netauto.lab/runbooks/device-down"

      - alert: ServiceDown
        expr: probe_success{job="http-probes"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "HTTP probe for {{ $labels.instance }} has been failing for 2 minutes."

  - name: interface_health
    rules:
      - alert: InterfaceDown
        # Fires when an Ethernet interface goes operationally down for any reason
        # (including a remote-side link failure or physical issue).
        # Excludes Loopback, Management, and Vlan interfaces to avoid noise.
        # For admin-shutdown detection see InterfaceAdminDown below.
        expr: |
          interface_ifOperStatus{ifDescr=~"Ethernet.*"} == 2
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Interface {{ $labels.ifDescr }} on {{ $labels.sysName }} is operationally down"
          description: "{{ $labels.ifDescr }} on {{ $labels.sysName }} ({{ $labels.agent_host }}) has been operationally down for more than 1 minute."

      - alert: InterfaceAdminDown
        # Fires when an Ethernet interface is administratively shut down.
        # This is the expected signal from chaos experiments and config changes.
        # ifAdminStatus values: 1=up, 2=down, 3=testing
        expr: |
          interface_ifAdminStatus{ifDescr=~"Ethernet.*"} == 2
        for: 1m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Interface {{ $labels.ifDescr }} on {{ $labels.sysName }} has been admin-shutdown"
          description: "{{ $labels.ifDescr }} on {{ $labels.sysName }} ({{ $labels.agent_host }}) has been administratively disabled for more than 1 minute."

      - alert: HighInterfaceUtilization
        expr: |
          (rate(interface_ifHCInOctets[5m]) + rate(interface_ifHCOutOctets[5m])) * 8
          / (interface_ifHighSpeed * 1e6) > 0.8
        for: 5m
        labels:
          severity: warning
          category: capacity
        annotations:
          summary: "High utilization on {{ $labels.sysName }} {{ $labels.ifDescr }}"
          description: "Interface utilization has been above 80% for 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: InterfaceHighErrorRate
        expr: |
          rate(interface_ifInErrors[5m]) + rate(interface_ifOutErrors[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          category: errors
        annotations:
          summary: "High error rate on {{ $labels.sysName }} {{ $labels.ifDescr }}"
          description: "Interface error rate is above 1% for 5 minutes."

  - name: system_resources
    rules:
      - alert: HighCPUUsage
        expr: |
          (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 90
        for: 10m
        labels:
          severity: warning
          category: resources
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage has been above 90% for 10 minutes (current: {{ $value }}%)."

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
          category: resources
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage has been above 90% for 10 minutes."

      - alert: DiskSpaceRunningLow
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
          category: resources
        annotations:
          summary: "Disk space running low on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Disk usage is above 85% (current: {{ $value | humanizePercentage }})."

  - name: bgp
    rules:
      - alert: BGPPeerDown
        # bgp_peer_bgpPeerState comes from Telegraf's bgp measurement + bgpPeerState field.
        # BGP4-MIB bgpPeerState values: 1=idle, 2=connect, 3=active, 4=opensent,
        #                               5=openconfirm, 6=established
        expr: bgp_peer_bgpPeerState != 6
        for: 2m
        labels:
          severity: critical
          category: routing
        annotations:
          summary: "BGP peer {{ $labels.bgpPeerRemoteAddr }} down on {{ $labels.sysName }}"
          description: "BGP session with peer {{ $labels.bgpPeerRemoteAddr }} on {{ $labels.sysName }} is not in Established state (current state: {{ $value }})."

      - alert: BGPPrefixCountDecreased
        expr: |
          (bgp_peer_bgpPeerInPrefixes - bgp_peer_bgpPeerInPrefixes offset 10m)
          / bgp_peer_bgpPeerInPrefixes offset 10m < -0.2
        for: 5m
        labels:
          severity: warning
          category: routing
        annotations:
          summary: "BGP prefix count dropped by >20% from peer {{ $labels.bgpPeerRemoteAddr }} on {{ $labels.sysName }}"
          description: "BGP received prefix count has dropped significantly, indicating possible route withdrawal."

  - name: infrastructure
    rules:
      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "Prometheus configuration reload failed"
          description: "Prometheus configuration reload has failed."
