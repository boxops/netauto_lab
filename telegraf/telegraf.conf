# ============================================================
# Telegraf Configuration – Network Automation Lab
# ============================================================

[agent]
  interval = "30s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "2s"
  flush_interval = "15s"
  flush_jitter = "5s"
  precision = ""
  hostname = ""
  omit_hostname = false

# ── Outputs ───────────────────────────────────────────────────────────────────

# Expose metrics for Prometheus scraping
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
  expiration_interval = "120s"

# ── Inputs ────────────────────────────────────────────────────────────────────

# Telegraf self-metrics
[[inputs.internal]]
  collect_memstats = false

# Ping Containerlab devices
[[inputs.ping]]
  urls = [
    "172.20.20.11",  # spine1
    "172.20.20.12",  # spine2
    "172.20.20.21",  # leaf1
    "172.20.20.22",  # leaf2
    "172.20.20.23",  # leaf3
  ]
  count = 3
  interval = "30s"
  timeout = 5.0
  [inputs.ping.tags]
    job = "icmp-probes"

# SNMP – Interface MIB (IF-MIB)
[[inputs.snmp]]
  agents = [
    "udp://172.20.20.11:161",
    "udp://172.20.20.12:161",
    "udp://172.20.20.21:161",
    "udp://172.20.20.22:161",
    "udp://172.20.20.23:161",
  ]
  version = 2
  community = "${SNMP_COMMUNITY}"
  interval = "30s"
  timeout = "5s"
  retries = 2
  name = "interface"

  # System information
  [[inputs.snmp.field]]
    name = "sysName"
    oid = "RFC1213-MIB::sysName.0"
    is_tag = true

  [[inputs.snmp.field]]
    name = "sysDescr"
    oid = "RFC1213-MIB::sysDescr.0"

  [[inputs.snmp.field]]
    name = "sysUpTime"
    oid = "RFC1213-MIB::sysUpTime.0"

  # Interface table
  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = ["sysName"]

    [[inputs.snmp.table.field]]
      name = "ifDescr"
      oid = "IF-MIB::ifDescr"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "ifAdminStatus"
      oid = "IF-MIB::ifAdminStatus"

    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = "IF-MIB::ifOperStatus"

    [[inputs.snmp.table.field]]
      name = "ifHighSpeed"
      oid = "IF-MIB::ifHighSpeed"

    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid = "IF-MIB::ifHCInOctets"

    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid = "IF-MIB::ifHCOutOctets"

    [[inputs.snmp.table.field]]
      name = "ifInErrors"
      oid = "IF-MIB::ifInErrors"

    [[inputs.snmp.table.field]]
      name = "ifOutErrors"
      oid = "IF-MIB::ifOutErrors"

    [[inputs.snmp.table.field]]
      name = "ifInDiscards"
      oid = "IF-MIB::ifInDiscards"

    [[inputs.snmp.table.field]]
      name = "ifOutDiscards"
      oid = "IF-MIB::ifOutDiscards"

    [[inputs.snmp.table.field]]
      name = "ifHCInUcastPkts"
      oid = "IF-MIB::ifHCInUcastPkts"

    [[inputs.snmp.table.field]]
      name = "ifHCOutUcastPkts"
      oid = "IF-MIB::ifHCOutUcastPkts"

# SNMP – BGP4-MIB
[[inputs.snmp]]
  agents = [
    "udp://172.20.20.11:161",
    "udp://172.20.20.12:161",
  ]
  version = 2
  community = "${SNMP_COMMUNITY}"
  interval = "60s"
  timeout = "5s"
  retries = 2
  name = "bgp"

  [[inputs.snmp.field]]
    name = "sysName"
    oid = "RFC1213-MIB::sysName.0"
    is_tag = true

  [[inputs.snmp.table]]
    name = "bgp_peer"
    inherit_tags = ["sysName"]

    [[inputs.snmp.table.field]]
      name = "bgpPeerRemoteAddr"
      oid = "BGP4-MIB::bgpPeerRemoteAddr"
      is_tag = true

    [[inputs.snmp.table.field]]
      name = "bgpPeerState"
      oid = "BGP4-MIB::bgpPeerState"

    [[inputs.snmp.table.field]]
      name = "bgpPeerFsmEstablishedTime"
      oid = "BGP4-MIB::bgpPeerFsmEstablishedTime"

    [[inputs.snmp.table.field]]
      name = "bgpPeerFsmEstablishedTransitions"
      oid = "BGP4-MIB::bgpPeerFsmEstablishedTransitions"

# HTTP endpoint monitoring (services health)
[[inputs.http_response]]
  urls = [
    "http://nautobot:8080/health/",
    "http://grafana:3000/api/health",
    "http://prometheus:9090/-/healthy",
    "http://gitea:3000/api/healthz",
  ]
  response_timeout = "10s"
  method = "GET"
  follow_redirects = true
  [inputs.http_response.tags]
    job = "http-probes"
